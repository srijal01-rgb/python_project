<!DOCTYPE html>
<html>
<head><title>Menu</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
    <h1>Food Menu</h1>
    <form method="post" action="{% url 'create_order' %}">
        {% csrf_token %}
        {% for item in items %}
            <div class="card mb-3">
                <div class="card-body">
                    <h5>{{ item.name }} - ${{ item.price }}</h5>
                    <p>{{ item.description }}</p>
                    <input type="checkbox" name="item" value="{{ item.id }}">
                </div>
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">Order Selected</button>
    </form>
</body>
</html>
